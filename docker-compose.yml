services:
  mysql:
    image: mysql:8.0
    container_name: prompter-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-prompter}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - prompter-mysql:/var/lib/mysql
    ports:
      - "3307:3306"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prompter-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-prompter}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: prompter-nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html
    depends_on:
      - app

volumes:
  prompter-mysql:
